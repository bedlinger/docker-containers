services:
  wishlist:
    container_name: wishlist
    image: ghcr.io/cmintey/wishlist:latest
    restart: unless-stopped
    volumes:
      - ./uploads:/usr/src/app/uploads
      - ./data:/usr/src/app/data
    ports:
      - 3280:3280
    environment:
      - ORIGIN=${ORIGIN}
      - TOKEN_TIME=${TOKEN_TIME}
      - DEFAULT_CURRENCY=${DEFAULT_CURRENCY}
