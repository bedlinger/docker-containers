services:
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    ports:
      - 4000:80
    command:
      - serve
    environment:
      TZ: "Europe/Vienna"
      NTFY_BASE_URL: "https://ntfy.tailda5058.ts.net"
      NTFY_AUTH_FILE: "/var/lib/ntfy/auth.db"
      NTFY_ENABLE_LOGIN: "true"
      NTFY_REQUIRE_LOGIN: "true"
      NTFY_CACHE_FILE: "/var/cache/ntfy/cache.db"
      NTFY_UPSTREAM_BASE_URL: "https://ntfy.sh"
      NTFY_AUTH_USERS: ${NTFY_AUTH_USERS}
    user: 501:20 # UID:GID - get via id command
    volumes:
      - ./ntfy-data/cache:/var/cache/ntfy
      - ./ntfy-data/lib:/var/lib/ntfy
      - ./ntfy-data/etc:/etc/ntfy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --tries=1 http://localhost:4000/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
    init: true # needed, if healthcheck is used. Prevents zombie processes
